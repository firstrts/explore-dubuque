# Nginx config for Payload CMS on NerdVM VPS
# Place at: /etc/nginx/sites-available/explore-dubuque-cms
# Then: sudo ln -s /etc/nginx/sites-available/explore-dubuque-cms /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name ExploreDubuque.com www.ExploreDubuque.com;
    # Redirect HTTP to HTTPS (Certbot will handle this after setup)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ExploreDubuque.com www.ExploreDubuque.com;

    # SSL — managed by Certbot (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/ExploreDubuque.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ExploreDubuque.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # Only proxy /admin and /api to Payload CMS
    # Everything else goes to Vercel (handled by DNS)
    location ~ ^/(admin|api)(/|$) {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 20M;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:3001;
    }
}
